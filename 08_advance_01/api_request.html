<!DOCTYPE html>
<html lang="en">

<body style="background-color: grey;">
    
    <!-- 0 	UNSENT 	Client has been created. open() not called yet.
1 	OPENED 	open() has been called.
2 	HEADERS_RECEIVED 	send() has been called, and headers and status are available.
3 	LOADING 	Downloading; responseText holds partial data.
4 	DONE 	The operation is complete. -->

<div id="card">
    <button id="button">Click</button>
</div>
</body>

<script>
    //a method to send and receive request
    const requestUrl =  'https://api.github.com/users/hiteshchoudhary';
//     const xhr = new XMLHttpRequest();
//     xhr.open('GET',requestUrl);
//  // response me most of the time data as a string wapas aata hai not as object

//             const data = JSON.parse(this.responseText);
//             console.log(data.followers);//data.followers : undefined
            
//         }
//     }

//     //open ko call karna padega
//     xhr.send();


    //maaking a card
    let divElement = document.querySelector('#card')
        
        // const data = JSON.parse(this.responseText);
    document.querySelector('#button').addEventListener('click',function(){
        const xhr = new XMLHttpRequest();
        xhr.open('GET',requestUrl);

        /*You register a callback — onload — that the browser automatically calls later, whenever the response actually finishes coming in
        What xhr.send() actually does
        When you call xhr.send(), it doesn't pause your code and wait for the server to respond. It just fires off the request in the background and immediately moves on to the next line of your script. Think of it like dropping a letter in a mailbox — you don't stand there until the reply comes back, you just walk away and go on with your day.
        */
        
        xhr.onload = function(){
            const data = JSON.parse(xhr.responseText);
            //we create the div and img element

            /*div.appendChild(data.photo) — you can't append a string/number
                appendChild() only accepts DOM nodes, not plain values. 
                If data.photo is a URL string and data.followers is a number, you need to either create elements and set their content, or set textContent/src*/
            const div = document.createElement("div");
            const img = document.createElement("img");
            img.src = data.photo;

            div.appendChild(img);

            const p = document.createElement('p');
            p.textContent = data.followers;

            div.appendChild(p);

            divElement.appendChild(div);
        };
       
        xhr.send();
    
        
    })
</script>
</html>
